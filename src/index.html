<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MapMig</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #0d0d1a;
    color: #d0d0d0;
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100vh;
    overflow: hidden;
  }
  code, .mono { font-family: 'Consolas', 'IBM Plex Mono', 'Courier New', monospace; }

  /* Header */
  #header {
    border-bottom: 1px solid #1a1a2e;
    padding: 10px 24px;
    display: flex; align-items: center; gap: 16px;
    flex-shrink: 0; background: #0d0d1a;
  }
  #header .spacer { flex: 1; }
  #saveBtn {
    background: #4ec9b0; color: #0d0d1a; border: none; padding: 8px 20px;
    border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 13px;
    font-family: 'Consolas', monospace; transition: all 0.15s;
  }
  #saveBtn:hover:not(:disabled) { background: #3db89e; }
  #saveBtn:disabled { cursor: default; }
  #saveAsBtn {
    background: transparent; color: #888; border: 1px solid #2a2a4a; padding: 8px 14px;
    border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 12px;
    font-family: 'Consolas', monospace; transition: all 0.15s;
  }
  #saveAsBtn:hover { color: #d0d0d0; border-color: #4ec9b0; }

  /* Tab bar */
  #tabbar {
    border-bottom: 1px solid #1a1a2e;
    padding: 0 24px;
    background: #0a0a16;
    flex-shrink: 0;
  }
  #tabbar #tabList {
    display: flex; gap: 0; align-items: stretch;
  }
  .tab-btn {
    padding: 10px 20px; cursor: pointer; display: flex; align-items: center; gap: 8px;
    border: none; background: transparent; color: #666; font-size: 12px;
    font-family: 'Segoe UI', -apple-system, sans-serif;
    border-bottom: 2px solid transparent; transition: all 0.15s;
  }
  .tab-btn:hover { color: #aaa; background: rgba(255,255,255,0.02); }
  .tab-btn.active { color: #d0d0d0; border-bottom-color: #4ec9b0; }
  .tab-btn .tab-icon { font-size: 13px; }

  /* Recents toggle */
  .recents-toggle { font-size: 16px !important; padding: 10px 14px !important; }
  .recents-toggle.active { color: #e8b931; border-bottom-color: #e8b931; }
  .tab-separator {
    width: 1px; background: #2a2a4a; margin: 6px 4px; flex-shrink: 0;
  }

  /* Recents panel */
  .recents-panel {
    display: none; position: fixed; top: 120px; left: 0;
    width: 280px; max-height: calc(100vh - 130px); background: #111128;
    border: 1px solid #2a2a4a; border-top: none; border-radius: 0 0 6px 0;
    z-index: 200; box-shadow: 4px 4px 12px rgba(0,0,0,0.4);
    overflow-y: auto;
  }
  .recents-panel.open { display: block; }
  .recents-header {
    padding: 10px 14px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid #1a1a2e; font-size: 11px; color: #888;
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .recents-list { padding: 4px 0; }
  .recent-item {
    padding: 8px 14px; cursor: pointer; font-size: 12px; color: #d0d0d0;
    font-family: 'Consolas', monospace; border-bottom: 1px solid #0d0d1a;
    transition: background 0.15s; display: flex; align-items: center; gap: 8px;
  }
  .recent-item:hover { background: rgba(255,255,255,0.05); }
  .recent-item .recent-icon { font-size: 14px; opacity: 0.5; }
  .recent-item .recent-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .recent-item .recent-date { font-size: 9px; color: #555; }

  /* Drop zone */
  /* Dropzone */
  #dropzone {
    margin: 40px 24px; border: 2px dashed #2a2a4a; border-radius: 8px;
    padding: 60px 40px; text-align: center; transition: border-color 0.2s;
  }
  #dropzone:hover, #dropzone.dragover { border-color: #e8b931; }
  #dropzone .icon { font-size: 32px; margin-bottom: 16px; }
  #dropzone .label { font-size: 14px; color: #888; margin-bottom: 6px; }
  #dropzone .sublabel { font-size: 11px; color: #555; margin-bottom: 20px; }
  .btn-primary {
    background: #e8b931; color: #0d0d1a; border: none; padding: 10px 20px;
    border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 13px;
  }
  .btn-primary:hover { background: #d4a82a; }

  /* Main layout */
  #main { display: none; flex: 1; min-height: 0; }
  #main.active { display: flex; }

  /* Sidebar */
  #sidebar {
    width: 260px; border-right: 1px solid #1a1a2e; padding: 16px 0; flex-shrink: 0;
    overflow-x: hidden; overflow-y: auto; display: flex; flex-direction: column;
  }
  .sidebar-section { padding: 0 16px; margin-bottom: 16px; flex-shrink: 0; }
  .sidebar-section-title {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: #666;
    margin-bottom: 8px;
  }
  .sidebar-history { padding: 0 16px; margin-bottom: 16px; overflow-y: auto; overflow-x: hidden; max-height: 250px; flex-shrink: 1; min-height: 0; }
  .sidebar-history-item {
    font-size: 10px; color: #888; padding: 3px 6px; border-left: 2px solid #2a2a4a;
    margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    cursor: default; max-width: 100%;
  }
  .sidebar-history-item:first-child { border-left-color: #4ec9b0; color: #aaa; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }
  .stat-card {
    background: #111128; border: 1px solid #1a1a2e; border-radius: 6px;
    padding: 3px 3px; text-align: center;
  }
  .stat-card .stat-val {
    font-weight: 700; font-family: 'Consolas', monospace;
    display: block; line-height: 1.2;
  }
  .stat-card .stat-label {
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: #666;
    display: block;
  }

  .cat-item {
    padding: 8px 16px; cursor: pointer; display: flex; align-items: center; gap: 10px;
    border-left: 2px solid transparent; transition: all 0.15s;
  }
  .cat-item:hover { background: rgba(255,255,255,0.02); }
  .cat-item.active { background: rgba(255,255,255,0.03); }
  .cat-item .cat-icon { font-size: 14px; }
  .cat-item .cat-name { font-size: 12px; color: #666; flex: 1; }
  .cat-item.active .cat-name { color: #d0d0d0; }

  .btn-reset {
    background: none; border: none; color: #d16969; cursor: pointer; font-size: 11px; padding: 2px 6px;
  }
  .btn-reload {
    background: none; border: none; color: #4ec9b0; cursor: pointer; font-size: 11px; padding: 2px 6px;
  }
  .btn-reload:hover { text-decoration: underline; }
  .file-name-tag {
    font-size: 9px; padding: 2px 6px; background: #1a1a2e; border-radius: 2px;
    color: #888; font-family: 'Consolas', monospace;
  }

  .btn-wad {
    width: 100%; background: transparent; color: #e8b931; border: 1px solid #2a2a4a;
    padding: 8px; border-radius: 4px; cursor: pointer; font-size: 11px; margin-top: 8px;
  }
  .btn-wad:hover { border-color: #e8b931; }

  /* Content */
  #content { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  #searchbar {
    padding: 12px 20px; border-bottom: 1px solid #1a1a2e;
    display: flex; align-items: center; gap: 12px;
  }
  #searchbar input {
    flex: 1; background: transparent; border: none; color: #d0d0d0;
    font-size: 13px; outline: none; font-family: 'Consolas', monospace;
  }
  #searchbar .count { font-size: 11px; color: #555; font-family: 'Consolas', monospace; white-space: nowrap; }

  #results { flex: 1; overflow-y: auto; padding-bottom: 40px; }

  /* Results */
  .result-item { border-bottom: 1px solid #1a1a2e; }
  .result-row {
    padding: 10px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px;
    transition: background 0.15s;
  }
  .result-row:hover { background: rgba(255,255,255,0.05); }
  .result-row.expanded { background: rgba(255,255,255,0.03); }
  .result-name { font-family: 'Consolas', monospace; font-size: 13px; font-weight: 600; flex: 1; }
  .result-meta {
    font-size: 11px; color: #666; font-style: italic; max-width: 300px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .result-arrow {
    color: #555; font-size: 12px; transition: transform 0.15s; display: inline-block;
  }
  .result-arrow.open { transform: rotate(90deg); }
  .result-detail { padding: 4px 16px 12px; }
  .special-tex { color: #d16969; }

  /* Entity instance */
  .ent-instance {
    margin-bottom: 8px; border: 1px solid #1a1a2e; border-radius: 4px; overflow: hidden;
  }
  .ent-instance-header {
    padding: 6px 10px; background: #111128; font-size: 10px; color: #888;
    font-family: 'Consolas', monospace; display: flex; align-items: center; gap: 8px;
  }
  .brush-count-badge {
    font-size: 10px; padding: 2px 8px; background: #1a1a2e; border-radius: 3px;
    color: #888; font-family: 'Consolas', monospace; border: 1px solid #2a2a4a;
  }

  /* KV table */
  .kv-table { width: 100%; border-collapse: collapse; margin-top: 4px; margin-bottom: 8px; }
  .kv-table th {
    text-align: left; font-size: 10px; color: #666; text-transform: uppercase;
    letter-spacing: 0.05em; padding: 4px 8px; border-bottom: 1px solid #1a1a2e;
    font-family: 'Consolas', monospace;
  }
  .kv-table td {
    font-size: 11px; padding: 3px 8px; border-bottom: 1px solid #0d0d1a;
    font-family: 'Consolas', monospace;
  }
  .kv-key { color: #569cd6; }
  .kv-val { color: #ce9178; }
  .kv-input {
    background: #1a1a2e; border: 1px solid #2a2a4a; color: #d0d0d0; padding: 4px 8px;
    border-radius: 3px; font-family: 'Consolas', monospace; font-size: 11px;
    width: 100%; outline: none; transition: border-color 0.15s;
  }
  .kv-input:focus { border-color: #4ec9b0; }
  .kv-input.multi-val { font-style: italic; color: #888; }
  .kv-input.multi-val::placeholder { font-style: italic; color: #666; }
  .kv-input.multi-val:focus { font-style: normal; color: #d0d0d0; }

  .btn-tiny-del {
    background: none; border: 1px solid #2a2a4a; color: #d16969; cursor: pointer;
    padding: 2px 6px; border-radius: 3px; font-size: 10px;
  }
  .btn-tiny-del:hover { border-color: #d16969; background: rgba(209, 105, 105, 0.1); }
  .btn-tiny-add {
    background: none; border: 1px solid #2a2a4a; color: #4ec9b0; cursor: pointer;
    padding: 4px 10px; border-radius: 3px; font-size: 10px; white-space: nowrap;
  }
  .btn-tiny-add:hover { border-color: #4ec9b0; background: rgba(78, 201, 176, 0.1); }

  .add-prop-row {
    display: flex; gap: 6px; align-items: center; margin-top: 4px;
  }

  /* Brush/texture editing */
  .section-label {
    font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .brush-block {
    margin: 6px 0; padding: 6px 8px; background: #0a0a16; border-radius: 4px;
    border: 1px solid #1a1a2e;
  }
  .brush-label {
    font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 0.05em;
    margin-bottom: 4px; display: block;
  }
  .face-row {
    display: flex; align-items: center; gap: 8px; margin: 3px 0;
  }
  .face-tex-input { width: 200px; }
  .tex-thumb {
    width: 24px; height: 24px; image-rendering: pixelated;
    border: 1px solid #2a2a4a; border-radius: 2px; flex-shrink: 0;
  }
  .tex-thumb-missing {
    width: 24px; height: 24px; display: inline-flex; align-items: center;
    justify-content: center; font-size: 14px; border: 1px solid #2a2a4a;
    border-radius: 2px; flex-shrink: 0; cursor: pointer;
  }
  .tex-thumb-row {
    width: 20px; height: 20px; image-rendering: pixelated;
    border: 1px solid #2a2a4a; border-radius: 2px; flex-shrink: 0;
  }
  .tex-thumb-missing-row {
    width: 20px; height: 20px; display: inline-flex; align-items: center;
    justify-content: center; font-size: 12px; border: 1px solid #2a2a4a;
    border-radius: 2px; flex-shrink: 0; cursor: pointer;
  }
  .tex-preview {
    display: inline-block; padding: 3px 10px; background: #1a1a2e;
    border-radius: 3px; font-family: 'Consolas', monospace; font-size: 11px;
    margin: 2px; color: #d0d0d0; border: 1px solid #2a2a4a;
  }

  /* Texture edit row */
  .tex-edit-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    flex-wrap: wrap;
  }

  /* Bulk edit */
  .bulk-section {
    margin: 16px 20px; padding: 16px; background: #111128;
    border: 1px solid #1a1a2e; border-radius: 6px;
  }
  .bulk-title {
    font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #d0d0d0;
  }
  .bulk-desc { font-size: 11px; color: #666; margin-bottom: 12px; }
  .bulk-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
  .bulk-field { flex: 1; min-width: 150px; }
  .bulk-field label {
    display: block; font-size: 10px; color: #666; text-transform: uppercase;
    letter-spacing: 0.05em; margin-bottom: 4px;
  }
  .btn-action {
    background: #4ec9b0; color: #0d0d1a; border: none; padding: 8px 16px;
    border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 12px;
    font-family: 'Consolas', monospace; white-space: nowrap;
  }
  .btn-action:hover { background: #3db89e; }
  .btn-action-danger { background: #d16969; }
  .btn-action-danger:hover { background: #c05050; }

  /* History */
  .history-list { max-height: 200px; overflow-y: auto; }
  .history-item {
    font-size: 10px; color: #888; padding: 3px 0; border-bottom: 1px solid #0d0d1a;
    font-family: 'Consolas', monospace;
  }

  /* Toast */
  #toast {
    position: fixed; bottom: 20px; right: 20px; background: #4ec9b0; color: #0d0d1a;
    padding: 10px 20px; border-radius: 4px; font-size: 12px; font-weight: 600;
    font-family: 'Consolas', monospace; z-index: 1000; display: none;
    transition: opacity 0.3s;
  }
  /* Custom context menu */
  .ctx-menu {
    position: fixed; z-index: 3000; background: #1a1a2e; border: 1px solid #2a2a4a;
    border-radius: 6px; padding: 4px 0; min-width: 160px; box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    font-size: 12px; font-family: 'Segoe UI', -apple-system, sans-serif;
  }
  .ctx-menu-item {
    padding: 6px 16px; color: #d0d0d0; cursor: pointer; display: flex; align-items: center; gap: 8px;
  }
  .ctx-menu-item:hover { background: rgba(78,201,176,0.15); }
  .ctx-menu-item.disabled { color: #555; pointer-events: none; }
  .ctx-menu-sep { height: 1px; background: #2a2a4a; margin: 4px 0; }

  /* Pulsing glow for Replace button */
  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 4px rgba(78,201,176,0.3); }
    50% { box-shadow: 0 0 12px rgba(78,201,176,0.8), 0 0 20px rgba(78,201,176,0.4); }
  }
  .btn-glow { animation: pulseGlow 2s ease-in-out infinite; }
</style>
</head>
